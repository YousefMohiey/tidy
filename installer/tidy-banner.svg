<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="800" height="250" viewBox="0 0 800 250">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Icon shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="250" fill="url(#bg-gradient)" rx="12" ry="12"/>
  
  <!-- Subtle accent line at bottom -->
  <rect x="250" y="200" width="300" height="3" fill="#9b59b6" rx="1.5" ry="1.5"/>
  
  <!-- Icon container with glow -->
  <g transform="translate(80, 75)" filter="url(#glow)">
    <circle cx="50" cy="50" r="50" fill="rgba(155, 89, 182, 0.15)"/>
  </g>
  
  <!-- Icon -->
  <g transform="translate(80, 75)" filter="url(#shadow)">
    <image width="100" height="100" xlink:href="tidy.svg"/>
  </g>
  
  <!-- Title text -->
  <text x="220" y="110" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="start">
    tidy
  </text>
  
  <!-- Subtitle text -->
  <text x="220" y="150" font-family="Arial, sans-serif" font-size="24" fill="#b8b8e0" text-anchor="start">
    Smart File Organizer
  </text>
  
  <!-- Description text -->
  <text x="220" y="180" font-family="Arial, sans-serif" font-size="16" fill="#8888a0" text-anchor="start">
    Organize files by content, not just extension
  </text>
</svg>
